<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#fff7f6",
              "tertiary": "#555f78",
              "tertiary-fixed-dim": "#c7d1ef",
              "secondary": "#3e6752",
              "surface-tint": "#3b6934",
              "on-surface": "#233442",
              "background": "#f6f9ff",
              "outline-variant": "#a2b4c5",
              "on-secondary": "#e6ffee",
              "on-secondary-fixed": "#1d4733",
              "on-primary-fixed-variant": "#386631",
              "inverse-on-surface": "#989da4",
              "primary": "#3b6934",
              "surface-container-low": "#ecf4fe",
              "on-primary": "#e6ffdb",
              "on-primary-fixed": "#1c4818",
              "error-container": "#fe8983",
              "error": "#9f403d",
              "on-tertiary-fixed-variant": "#4f5972",
              "surface-container-highest": "#d2e5f7",
              "secondary-fixed": "#bfedd1",
              "secondary-dim": "#325b46",
              "on-secondary-container": "#315a45",
              "secondary-container": "#bfedd1",
              "primary-fixed": "#bcf0ae",
              "surface-bright": "#f6f9ff",
              "on-primary-container": "#2f5c28",
              "outline": "#6b7d8d",
              "error-dim": "#4e0309",
              "on-error-container": "#752121",
              "primary-container": "#bcf0ae",
              "on-surface-variant": "#506170",
              "secondary-fixed-dim": "#b1dfc3",
              "tertiary-fixed": "#d5dffd",
              "surface-variant": "#d2e5f7",
              "primary-dim": "#2f5c29",
              "inverse-primary": "#b9eeab",
              "on-background": "#233442",
              "surface-container": "#e4effc",
              "tertiary-dim": "#49536b",
              "surface-container-high": "#dbeaf9",
              "on-tertiary-container": "#465068",
              "on-tertiary-fixed": "#333d55",
              "surface-container-lowest": "#ffffff",
              "inverse-surface": "#090f14",
              "primary-fixed-dim": "#aee2a0",
              "tertiary-container": "#d5dffd",
              "on-secondary-fixed-variant": "#3b644e",
              "surface": "#f6f9ff",
              "on-tertiary": "#f9f8ff",
              "surface-dim": "#c7ddf2"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .sculpted-shadow {
        box-shadow: -6px -6px 12px rgba(255, 255, 255, 0.8), 
                    8px 8px 16px rgba(35, 52, 66, 0.06);
      }
      .sculpted-inner-shadow {
        box-shadow: inset 4px 4px 8px rgba(35, 52, 66, 0.05), 
                    inset -4px -4px 8px rgba(255, 255, 255, 0.8);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        min-height: 100dvh;
      }
    </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<!-- Background Content (Simulated Player List) -->
<div class="fixed inset-0 z-0 flex flex-col p-6 filter blur-sm">
<header class="flex items-center justify-between mb-8">
<h1 class="font-headline font-extrabold text-2xl text-primary">玩家列表</h1>
<button class="w-12 h-12 rounded-2xl bg-primary-container text-on-primary-container flex items-center justify-center sculpted-shadow">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
</button>
</header>
<div class="space-y-4">
<div class="bg-surface-container-lowest p-4 rounded-xl sculpted-shadow flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-variant"></div>
<div class="flex-1">
<div class="h-4 w-24 bg-surface-variant rounded"></div>
<div class="h-3 w-16 bg-surface-container-highest rounded mt-2"></div>
</div>
</div>
<div class="bg-surface-container-lowest p-4 rounded-xl sculpted-shadow flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-variant"></div>
<div class="flex-1">
<div class="h-4 w-32 bg-surface-variant rounded"></div>
<div class="h-3 w-20 bg-surface-container-highest rounded mt-2"></div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
<div class="absolute inset-0 bg-on-surface/20 backdrop-blur-md"></div>
<!-- Modal Content -->
<div class="relative w-full max-w-sm bg-background rounded-[2.5rem] sculpted-shadow overflow-hidden flex flex-col animate-in fade-in zoom-in duration-300">
<div class="px-8 pt-8 pb-6 flex flex-col items-center">
<h2 class="font-headline font-bold text-xl text-primary mb-6">添加新玩家</h2>
<!-- Avatar Selection -->
<div class="relative mb-8">
<div class="w-28 h-28 rounded-[2rem] bg-surface-container-lowest sculpted-shadow p-1 overflow-hidden">
<img alt="Player Avatar" class="w-full h-full object-cover rounded-[1.8rem]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBv7TO79zZL7BI7oe3BNpeLQNvxzFmcTluo1Bg_hskUTANzHnilp2IhXDh6LT5c-oxbxeJhSn4SLvyNN-iYH8Ze0zxCK-bSIFpU9ocsNylQ_dSXZc7Qip05EYbV91OtcXQWo6S_Nqy63-RduIDV1vFSVkMWUgi1o9kQjHC4l-lVQusWkADD4x7WTuOfkTfB1bDn9yBBjdMJlMn_QI0up43HKK6gi4ryAUY3Vr4CKT3IWg0YMLWP_DAQQIbepo0QH07O0k9Qw1ngAQRo"/>
</div>
<button class="absolute -bottom-1 -right-1 w-9 h-9 bg-primary-container text-on-primary-container rounded-xl sculpted-shadow flex items-center justify-center border-4 border-background active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
</button>
</div>
<!-- Form -->
<div class="w-full space-y-6">
<!-- Player Name -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant/70 px-1" for="player-name">玩家姓名</label>
<div class="bg-surface-container-low sculpted-inner-shadow rounded-2xl px-5 py-3.5">
<input class="bg-transparent border-none w-full focus:ring-0 text-on-surface font-semibold placeholder:text-outline-variant/40" id="player-name" placeholder="请输入玩家姓名" type="text"/>
</div>
</div>
<!-- Initial Score -->
<div class="space-y-2">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant/70 px-1">初始积分</label>
<div class="bg-surface-container-lowest sculpted-shadow rounded-2xl p-4 flex items-center justify-between">
<button class="w-10 h-10 rounded-xl bg-surface-container-low text-primary flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<div class="text-center">
<span class="block text-2xl font-headline font-extrabold text-primary">25,000</span>
<span class="text-[9px] font-bold text-on-surface-variant/60 uppercase tracking-[0.15em]">Points</span>
</div>
<button class="w-10 h-10 rounded-xl bg-primary-container text-on-primary-container flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
</div>
<!-- Actions -->
<div class="w-full space-y-3 pt-6">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-dim text-on-primary rounded-2xl font-headline font-bold text-base shadow-lg active:scale-[0.98] transition-all">
              确认添加
            </button>
<button class="w-full py-3 bg-transparent text-on-surface-variant font-bold text-sm hover:text-primary transition-colors">
              取消
            </button>
</div>
</div>
</div>
</div>
<!-- BottomNavBar (Visible but disabled/blurred) -->
<nav class="fixed bottom-0 left-0 w-full z-10 flex justify-around items-center px-4 pb-6 pt-3 bg-background/80 backdrop-blur-xl shadow-[0_-8px_20px_-6px_rgba(35,52,66,0.06)] rounded-t-[1.5rem] filter blur-sm pointer-events-none">
<a class="flex flex-col items-center justify-center text-slate-400 px-5 py-1.5" href="#">
<span class="material-symbols-outlined" data-icon="casino">casino</span>
<span class="font-['Manrope'] text-[10px] font-semibold">游戏</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#bcf0ae] text-[#2f5c29] rounded-2xl px-5 py-1.5 shadow-inner" href="#">
<span class="material-symbols-outlined" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-['Manrope'] text-[10px] font-semibold">玩家</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-5 py-1.5" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Manrope'] text-[10px] font-semibold">设置</span>
</a>
</nav>
</body></html>
