<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tactile Zen - 设置</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .neumorphic-outset {
            box-shadow: -6px -6px 12px rgba(255,255,255,0.8), 8px 8px 16px rgba(35,52,66,0.06);
        }
        .neumorphic-inset {
            box-shadow: inset 4px 4px 8px rgba(35,52,66,0.05), inset -4px -4px 8px rgba(255,255,255,0.9);
        }
        body {
            background-color: #f6f9ff;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "surface": "#f6f9ff",
                "outline": "#6b7d8d",
                "primary-fixed": "#bcf0ae",
                "on-background": "#233442",
                "surface-container-low": "#ecf4fe",
                "surface-container": "#e4effc",
                "on-surface": "#233442",
                "primary-container": "#bcf0ae",
                "surface-container-lowest": "#ffffff",
                "primary": "#3b6934",
                "background": "#f6f9ff",
                "on-surface-variant": "#506170",
                "outline-variant": "#a2b4c5",
                "error": "#9f403d",
              },
              fontFamily: {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Manrope"],
                "label": ["Manrope"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body {
          min-height: 100dvh;
        }
    </style>
</head>
<body class="font-body text-on-surface min-h-screen py-12">
<main class="px-6 max-w-2xl mx-auto space-y-8">
<!-- Header Title (Since App Bar is removed) -->
<header class="flex items-center justify-between mb-8">
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-[#3b6934]">设置</h1>
<div class="w-12 h-12 rounded-full bg-surface-container-lowest neumorphic-outset flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="person">person</span>
</div>
</header>
<!-- Game Rules Section -->
<section class="space-y-4">
<h2 class="font-headline font-extrabold text-sm uppercase tracking-widest text-on-surface-variant px-2">游戏规则</h2>
<div class="bg-surface-container-lowest rounded-2xl p-6 space-y-6 shadow-[-6px_-6px_12px_rgba(255,255,255,0.8),8px_8px_16px_rgba(35,52,66,0.06)]">
<!-- Bottom Point Stepper -->
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="font-semibold text-on-surface">底分</span>
<span class="text-xs text-on-surface-variant italic">Bottom Point</span>
</div>
<div class="flex items-center gap-4 p-1 bg-surface-container rounded-xl neumorphic-inset">
<button class="w-10 h-10 flex items-center justify-center bg-surface-container-lowest rounded-lg neumorphic-outset active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary" data-icon="remove">remove</span>
</button>
<span class="font-headline font-bold text-lg w-6 text-center">1</span>
<button class="w-10 h-10 flex items-center justify-center bg-surface-container-lowest rounded-lg neumorphic-outset active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Capping Stepper -->
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="font-semibold text-on-surface">封顶倍数</span>
<span class="text-xs text-on-surface-variant italic">Capping</span>
</div>
<div class="flex items-center gap-4 p-1 bg-surface-container rounded-xl neumorphic-inset">
<button class="w-10 h-10 flex items-center justify-center bg-surface-container-lowest rounded-lg neumorphic-outset active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary" data-icon="remove">remove</span>
</button>
<span class="font-headline font-bold text-lg w-6 text-center">8</span>
<button class="w-10 h-10 flex items-center justify-center bg-surface-container-lowest rounded-lg neumorphic-outset active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary" data-icon="add">add</span>
</button>
</div>
</div>
</div>
</section>
<!-- Visual & Display Section -->
<section class="space-y-4">
<h2 class="font-headline font-extrabold text-sm uppercase tracking-widest text-on-surface-variant px-2">视觉与显示</h2>
<div class="bg-surface-container-lowest rounded-2xl p-6 space-y-6 shadow-[-6px_-6px_12px_rgba(255,255,255,0.8),8px_8px_16px_rgba(35,52,66,0.06)]">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="font-semibold text-on-surface">音效反馈</span>
<span class="text-xs text-on-surface-variant italic">Sound Effects</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-surface-container rounded-full neumorphic-inset peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-primary after:rounded-full after:h-6 after:w-6 after:transition-all after:shadow-md"></div>
</label>
</div>
</div>
</section>
<!-- General Settings Section -->
<!-- About & Support Section -->
<section class="space-y-4">
<h2 class="font-headline font-extrabold text-sm uppercase tracking-widest text-on-surface-variant px-2">关于与支持</h2>
<div class="bg-surface-container-lowest rounded-2xl overflow-hidden shadow-[-6px_-6px_12px_rgba(255,255,255,0.8),8px_8px_16px_rgba(35,52,66,0.06)]">
<div class="flex items-center justify-between p-6 border-b border-surface-container">
<div class="flex flex-col">
<span class="font-semibold text-on-surface">版本号</span>
<span class="text-xs text-on-surface-variant italic">Version</span>
</div>
<span class="text-sm font-bold text-primary px-3 py-1 bg-primary-container/30 rounded-full">v1.2.0</span>
</div>
<button class="w-full flex items-center justify-between p-6 border-b border-surface-container hover:bg-surface-container-low transition-colors">
<div class="flex flex-col items-start text-error">
<span class="font-semibold">清除缓存</span>
<span class="text-xs opacity-70 italic">Clear Cache</span>
</div>
<span class="material-symbols-outlined text-error" data-icon="delete">delete</span>
</button>
<button class="w-full flex items-center justify-between p-6 hover:bg-surface-container-low transition-colors">
<div class="flex flex-col items-start">
<span class="font-semibold text-on-surface">关于 Tactile Zen</span>
<span class="text-xs text-on-surface-variant italic">About Tactile Zen</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="info">info</span>
</button>
</div>
</section>
<!-- Aesthetic Imagery Footer -->
<div class="mt-12 rounded-3xl overflow-hidden h-48 relative shadow-2xl">
<img alt="Zen mahjong tiles" class="w-full h-full object-cover" data-alt="Close-up of premium white mahjong tiles on a soft green felt surface with cinematic lighting and shallow depth of field" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMusB5jdPPfBzIzjkw4Cuotl8cCyj0rKcyujy2O8L7mv8qqazI2jjesWfqd_KX4G7eerepYZWTlVejn2Epqm2V3LKUn7EcCzdPKt8Lb7J__rYzXSIln_9bJ2EYjzsgIoo5thTkkkKm7ms9NI1ccjyjoqBu8wkAA8OVmiBJ66810x6U615IyQdClzuif8enAscguIkgnzg9X_kHB3VxZZ_0np-OeOH3FWD4AXHhaPJ64F93jPZzyyaDgAOE0d6WE6-MSdqIhmH_yM5S"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<div class="absolute bottom-6 left-6 right-6">
<p class="font-headline font-bold text-lg text-on-background">尽享博弈时光</p>
<p class="text-sm text-on-surface-variant">愿好运常伴身旁。</p>
</div>
</div>
</main>
</body></html>
