<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "surface": "#f6f9ff",
              "on-secondary-fixed": "#1d4733",
              "outline-variant": "#a2b4c5",
              "primary": "#3b6934",
              "inverse-on-surface": "#989da4",
              "outline": "#6b7d8d",
              "on-primary": "#e6ffdb",
              "secondary-container": "#bfedd1",
              "on-tertiary-container": "#465068",
              "background": "#f6f9ff",
              "secondary": "#3e6752",
              "on-surface": "#233442",
              "secondary-dim": "#325b46",
              "on-error-container": "#752121",
              "tertiary": "#555f78",
              "primary-container": "#bcf0ae",
              "secondary-fixed": "#bfedd1",
              "inverse-primary": "#b9eeab",
              "surface-container-high": "#dbeaf9",
              "tertiary-fixed": "#d5dffd",
              "surface-tint": "#3b6934",
              "on-secondary-container": "#315a45",
              "surface-variant": "#d2e5f7",
              "error-container": "#fe8983",
              "error": "#9f403d",
              "on-primary-fixed-variant": "#386631",
              "on-tertiary-fixed-variant": "#4f5972",
              "primary-fixed": "#bcf0ae",
              "secondary-fixed-dim": "#b1dfc3",
              "on-primary-container": "#2f5c28",
              "on-error": "#fff7f6",
              "on-tertiary-fixed": "#333d55",
              "on-surface-variant": "#506170",
              "on-secondary-fixed-variant": "#3b644e",
              "tertiary-container": "#d5dffd",
              "primary-dim": "#2f5c29",
              "primary-fixed-dim": "#aee2a0",
              "on-secondary": "#e6ffee",
              "tertiary-dim": "#49536b",
              "surface-dim": "#c7ddf2",
              "on-primary-fixed": "#1c4818",
              "tertiary-fixed-dim": "#c7d1ef",
              "surface-container": "#e4effc",
              "surface-container-highest": "#d2e5f7",
              "inverse-surface": "#090f14",
              "surface-bright": "#f6f9ff",
              "surface-container-low": "#ecf4fe",
              "on-tertiary": "#f9f8ff",
              "error-dim": "#4e0309",
              "on-background": "#233442"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Neumorphic Extrusion Effect - Punchier */
        .sculpted-surface {
            background: #ffffff;
            box-shadow: -8px -8px 16px rgba(255, 255, 255, 1), 
                        10px 10px 20px rgba(35, 52, 66, 0.12);
        }
        /* Neumorphic Inset/Pressed Effect - Deeper Contrast */
        .sculpted-pressed {
            background: #dff2e1;
            box-shadow: inset 6px 6px 12px rgba(35, 52, 66, 0.15), 
                        inset -6px -6px 12px rgba(255, 255, 255, 0.8);
        }
        /* Modal Backdrop Blur */
        .glass-overlay {
            background-color: rgba(228, 239, 252, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen">
<!-- Top App Bar (Shared Component Strategy) -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-[#f6f9ff] dark:bg-slate-900 shadow-sm sticky top-0 z-40">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#3b6934] dark:text-green-400" data-icon="grid_view">grid_view</span>
<h1 class="font-headline font-bold text-xl tracking-tight text-[#3b6934] dark:text-green-400">Tactile Zen Score</h1>
</div>
<button class="p-2 rounded-full hover:bg-[#e4effc] dark:hover:bg-slate-800 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="p-6 pb-32">
<!-- Game Context Preview (Background Content) -->
<section class="space-y-6 opacity-40 select-none pointer-events-none">
<div class="sculpted-surface p-6 rounded-3xl">
<div class="flex justify-between items-center mb-4">
<span class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Current Match</span>
<span class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full text-xs font-bold uppercase tracking-tighter">Round 4</span>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="p-4 rounded-2xl bg-surface-container-low">
<p class="font-label text-[10px] uppercase text-outline mb-1">East Wind</p>
<p class="font-headline font-bold text-lg">Player A</p>
<p class="text-primary font-extrabold">24,000</p>
</div>
<div class="p-4 rounded-2xl bg-surface-container-low border border-primary/20">
<p class="font-label text-[10px] uppercase text-outline mb-1">South Wind (You)</p>
<p class="font-headline font-bold text-lg text-primary">Player B</p>
<p class="text-primary font-extrabold">32,500</p>
</div>
</div>
</div>
</section>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 glass-overlay flex items-center justify-center p-6">
<div class="w-full max-w-sm rounded-[2.5rem] bg-surface-container-lowest p-8 shadow-[0_40px_80px_-15px_rgba(35,52,66,0.15)] relative overflow-hidden">
<!-- Ambient Glow Background -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary-container/30 rounded-full blur-[60px]"></div>
<header class="text-center mb-8 relative z-10">
<h2 class="font-headline font-extrabold text-3xl text-on-surface tracking-tight">选择分数 (1-8倍)</h2>
<p class="font-body text-on-surface-variant text-sm mt-1">确认胡牌番数</p>
</header>
<!-- 4x2 Scoring Grid -->
<div class="grid grid-cols-2 gap-6 relative z-10 mb-10"><!-- Score Option 1 -->
<button class="flex flex-col items-center justify-center aspect-square sculpted-surface rounded-3xl transition-all active:scale-95 border border-white/50">
<span class="font-headline font-extrabold text-5xl text-on-surface-variant">1</span>
<span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant mt-1">倍</span>
</button>
<!-- Score Option 2 (Selected Example) -->
<button class="flex flex-col items-center justify-center aspect-square sculpted-pressed rounded-3xl transition-all border border-primary/20">
<span class="font-headline font-extrabold text-5xl text-primary">2</span>
<span class="font-label text-xs font-bold uppercase tracking-widest text-primary mt-1">倍</span>
</button>
<!-- Score Option 4 -->
<button class="flex flex-col items-center justify-center aspect-square sculpted-surface rounded-3xl transition-all active:scale-95 border border-white/50">
<span class="font-headline font-extrabold text-5xl text-on-surface-variant">4</span>
<span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant mt-1">倍</span>
</button>
<!-- Score Option 8 -->
<button class="flex flex-col items-center justify-center aspect-square sculpted-surface rounded-3xl transition-all active:scale-95 border border-white/50">
<span class="font-headline font-extrabold text-5xl text-on-surface-variant">8</span>
<span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant mt-1">倍</span>
</button></div>
<!-- Action Footer -->
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Shared Component Strategy) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#f6f9ff]/80 dark:bg-slate-900/80 backdrop-blur-xl z-50 rounded-t-[2rem] shadow-[0_-8px_20px_-6px_rgba(35,52,66,0.06)]">
<a class="flex flex-col items-center justify-center bg-[#bcf0ae] dark:bg-green-900/40 text-[#2f5c29] dark:text-green-100 rounded-2xl px-5 py-2 shadow-[inset_2px_2px_5px_rgba(0,0,0,0.05)]" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="style" style="font-variation-settings: 'FILL' 1;">style</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest">Game</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-[#3b6934] dark:hover:text-green-300" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="history">history</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest">History</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-[#3b6934] dark:hover:text-green-300" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="group">group</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest">Players</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-[#3b6934] dark:hover:text-green-300" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="leaderboard">leaderboard</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest">Stats</span>
</a>
</nav>
</body></html>
